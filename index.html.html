<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Khushi</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
background:linear-gradient(135deg,#ff4e8a,#ff9a9e);
text-align:center;
color:white;
overflow:hidden;
}

/* Password Screen */
#login{
display:flex;
flex-direction:column;
align-items:center;
}

input{
padding:10px;
border:none;
border-radius:10px;
margin-top:10px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

/* Birthday Content */
#main{
display:none;
}

h1{
font-size:45px;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px white;}
to{ text-shadow:0 0 30px #ff0066;}
}

.gift{
font-size:100px;
cursor:pointer;
margin-top:20px;
transition:0.3s;
}

.gift:hover{
transform:scale(1.2) rotate(10deg);
}

#surprise{
display:none;
margin-top:20px;
}

#surprise img{
width:220px;
border-radius:20px;
border:5px solid white;
}

#typing{
font-size:22px;
margin-top:10px;
}

/* hearts */
.heart{
position:absolute;
font-size:20px;
animation: float 6s linear infinite;
}

@keyframes float{
0%{ transform:translateY(100vh); opacity:1;}
100%{ transform:translateY(-10vh); opacity:0;}
}

/* confetti */
.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{ transform:translateY(0);}
100%{ transform:translateY(100vh);}
}

/* fireworks */
.firework{
position:absolute;
border-radius:50%;
pointer-events:none;
mix-blend-mode:screen;
}
</style>
</head>

<body>

<!-- Background Music -->
<audio id="music" src="C:\Users\Dell\OneDrive\Desktop\Aesthetic\Admirin' You (Official Video) Karan Aujla _ Ikky _ Making Memories _ Latest Punjabi Songs 2023 [k85UB5b6pJU].mp3" autoplay loop></audio>

<!-- PASSWORD PAGE -->
<div id="login">
<h2>🔐 Enter Secret Password</h2>
<input type="password" id="pass" placeholder="Enter password">
<button onclick="checkPassword()">Open Surprise</button>
</div>

<!-- BIRTHDAY PAGE -->
<div id="main">
<h1>🎂 Happy Birthday Khushi (Guddi) 💖</h1>
<p>Click the gift for a special surprise 🎁</p>

<div class="gift" onclick="openGift()">🎁</div>

<div id="surprise">
<img src="khushi1.jpeg">
<img src="khushi2.jpeg">
<p id="typing"></p>
</div>
</div>

<script>
/* Password Check */
function checkPassword(){
let password="guddi";
let user=document.getElementById("pass").value;
if(user===password){
document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";
document.getElementById("music").play();
}else{
alert("Wrong Password 😅");
}
}

/* Typing Message */
let message="Dear Khushi 💕 You are one of the most special people in my life. I feel lucky to have a friend like you. Keep smiling always Guddi 😊";
let i=0;
function typeEffect(){
if(i < message.length){
document.getElementById("typing").innerHTML += message.charAt(i);
i++;
setTimeout(typeEffect,50);
}
}

/* Open Gift */
function openGift(){
document.getElementById("surprise").style.display="block";
typeEffect();
createConfetti();
createFireworks();
}

/* Floating Hearts */
function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(heart);
setTimeout(()=>{heart.remove();},6000);
}
setInterval(createHeart,300);

/* Confetti */
function createConfetti(){
for(let i=0;i<80;i++){
let confetti=document.createElement("div");
confetti.className="confetti";
confetti.style.left=Math.random()*100+"vw";
confetti.style.backgroundColor="rgb("+Math.random()*255+","+Math.random()*255+","+Math.random()*255+")";
document.body.appendChild(confetti);
setTimeout(()=>{confetti.remove();},3000);
}
}

/* Fireworks */
function createFireworks(){
for(let i=0;i<30;i++){
let fw=document.createElement("div");
fw.className="firework";
fw.style.width="5px";
fw.style.height="5px";
fw.style.backgroundColor=`hsl(${Math.random()*360},100%,50%)`;
fw.style.left=window.innerWidth/2 + (Math.random()-0.5)*200 + "px";
fw.style.top=window.innerHeight/2 + (Math.random()-0.5)*200 + "px";
document.body.appendChild(fw);
setTimeout(()=>{fw.remove();},1500);
}
}
</script>

</body>

</html>
